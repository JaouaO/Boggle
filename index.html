<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boggle</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <div class="container">

        <div class="sidebar">

            <h2>TAILLE</h2>

            <div class="size-selector">
                <button type="button" class="size-btn" data-size="3" aria-pressed="false">3×3</button>
                <button type="button" class="size-btn" data-size="4" aria-pressed="false">4×4</button>
                <button type="button" class="size-btn" data-size="5" aria-pressed="false">5×5</button>
            </div>

            <button id="randomBtn" class="action-btn">
                Lettres aléatoires
            </button>

            <input id="wordInput" type="text" placeholder="Tester un mot">

            <button id="checkBtn" class="action-btn">
                Vérifier
            </button>

            <div id="result" role="status" aria-live="polite"></div>

            <section class="found-words" aria-labelledby="foundWordsTitle">
                <div class="found-words-header">
                    <h3 id="foundWordsTitle">Mots trouvés</h3>
                    <span id="foundWordsCount" class="found-words-count">0</span>
                </div>

                <div id="foundWords" class="found-words-list"></div>
            </section>

            <button id="solveBtn" class="action-btn">
                Trouver les mots
            </button>
            
            <div id="solverResult"></div>

        </div>

        <div class="board-wrapper">
            <div id="board" class="board"></div>
        </div>

    </div>

    <!-- JS -->
    <script type="module" src="./js/main.js"></script>

</body>

</html>
